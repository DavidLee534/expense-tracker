<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지출 수정 — 가계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="create.css"><!-- 폼 스타일 공유 -->
  <link rel="stylesheet" href="edit.css">
</head>
<body>

<header class="topnav">
  <a class="topnav__brand" href="../index.html">💰 가계부</a>
  <nav class="topnav__links">
    <a class="topnav__link" href="../index.html">대시보드</a>
    <a class="topnav__link active" href="list.html">지출 내역</a>
    <a class="topnav__link" href="../stats/index.html">통계</a>
    <a class="topnav__link" href="../board/list.html">게시판</a>
  </nav>
  <div class="topnav__user">
    <span id="user-name"></span>
    <button class="topnav__logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<main class="main">

  <div class="page-head">
    <div>
      <div class="breadcrumb"><a href="list.html">지출 내역</a> / 지출 수정</div>
      <h1 class="page-title">지출 수정</h1>
    </div>
    <a class="btn btn-outline" href="list.html">← 목록으로</a>
  </div>

  <form class="form-card" id="edit-form" novalidate>

    <div class="form-field">
      <label class="form-label" for="f-amount">금액 <span class="required">*</span></label>
      <input class="form-input" type="number" id="f-amount" min="1" step="1" required>
      <div class="field-error" id="err-amount"></div>
    </div>

    <div class="form-field">
      <label class="form-label" for="f-date">날짜 <span class="required">*</span></label>
      <input class="form-input" type="date" id="f-date" required>
      <div class="field-error" id="err-date"></div>
    </div>

    <div class="form-field">
      <label class="form-label">카테고리 <span class="required">*</span></label>
      <div class="category-group" id="category-group"></div>
    </div>

    <div class="form-field">
      <label class="form-label" for="f-memo">메모</label>
      <input class="form-input" type="text" id="f-memo" maxlength="60">
    </div>

    <div class="form-actions">
      <button class="btn btn-danger" type="button" id="delete-btn">삭제</button>
      <a class="btn btn-outline" href="list.html">취소</a>
      <button class="btn btn-primary" type="submit">저장</button>
    </div>
  </form>

</main>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="edit.js"></script>
</body>
</html>
