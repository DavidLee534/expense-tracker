<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">💰 가계부</div>
  <p class="auth-sub">로그인하고 지출 내역을 기록해보세요</p>

  <div class="auth-error" id="auth-error"></div>

  <form id="login-form" novalidate>
    <div class="form-field">
      <label class="form-label" for="f-email">이메일</label>
      <input class="form-input" type="email" id="f-email" placeholder="you@example.com" required>
    </div>
    <div class="form-field">
      <label class="form-label" for="f-password">비밀번호</label>
      <input class="form-input" type="password" id="f-password" placeholder="비밀번호" required>
    </div>
    <button class="btn-submit" type="submit">로그인</button>
  </form>

  <p class="auth-switch">아직 계정이 없으신가요? <a href="signup.html">회원가입</a></p>
</div>

<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="login.js"></script>
</body>
</html>
