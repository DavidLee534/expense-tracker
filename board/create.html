<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 — 가계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="create.css">
</head>
<body>

<header class="topnav">
  <a class="topnav__brand" href="../index.html">💰 가계부</a>
  <nav class="topnav__links">
    <a class="topnav__link" href="../index.html">대시보드</a>
    <a class="topnav__link" href="../expenses/list.html">지출 내역</a>
    <a class="topnav__link" href="../stats/index.html">통계</a>
    <a class="topnav__link active" href="list.html">게시판</a>
  </nav>
  <div class="topnav__user">
    <span id="user-name"></span>
    <button class="topnav__logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<main class="main">

  <div class="page-head">
    <div>
      <div class="breadcrumb"><a href="list.html">게시판</a> / 글쓰기</div>
      <h1 class="page-title">글쓰기</h1>
    </div>
    <a class="btn btn-outline" href="list.html">← 목록으로</a>
  </div>

  <form class="form-card" id="create-form" novalidate>

    <div class="form-field">
      <label class="form-label" for="f-title">제목 <span class="required">*</span></label>
      <input class="form-input" type="text" id="f-title" placeholder="예: 매달 10만원 더 모으는 방법" maxlength="60" required>
      <div class="field-error" id="err-title"></div>
    </div>

    <div class="form-field">
      <label class="form-label" for="f-content">내용 <span class="required">*</span></label>
      <textarea class="form-textarea" id="f-content" rows="8" placeholder="절약 팁을 자유롭게 나눠주세요" maxlength="2000" required></textarea>
      <div class="field-error" id="err-content"></div>
    </div>

    <div class="form-actions">
      <a class="btn btn-outline" href="list.html">취소</a>
      <button class="btn btn-primary" type="submit">등록</button>
    </div>
  </form>

</main>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="create.js"></script>
</body>
</html>
