<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — 가계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header class="topnav">
  <a class="topnav__brand" href="index.html">💰 가계부</a>
  <nav class="topnav__links">
    <a class="topnav__link active" href="index.html">대시보드</a>
    <a class="topnav__link" href="expenses/list.html">지출 내역</a>
    <a class="topnav__link" href="stats/index.html">통계</a>
  </nav>
  <div class="topnav__user">
    <span id="user-name"></span>
    <button class="topnav__logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<main class="main">

  <div class="page-head">
    <h1 class="page-title" id="welcome-title">안녕하세요!</h1>
    <p class="page-sub">이번 달 지출 현황을 확인해보세요</p>
  </div>

  <!-- 요약 카드 -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-card__label">이번 달 총지출</div>
      <div class="stat-card__value" id="stat-total">0원</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">전월 대비</div>
      <div class="stat-card__value" id="stat-diff">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">이번 달 지출 건수</div>
      <div class="stat-card__value" id="stat-count">0건</div>
    </div>
  </div>

  <div class="grid">
    <!-- 카테고리 비중 -->
    <section class="panel">
      <div class="panel__head">
        <h2 class="panel__title">이번 달 카테고리 비중</h2>
        <a class="panel__link" href="stats/index.html">통계 더보기 →</a>
      </div>
      <div class="mini-body" id="mini-category"></div>
    </section>

    <!-- 최근 지출 -->
    <section class="panel">
      <div class="panel__head">
        <h2 class="panel__title">최근 지출 내역</h2>
        <a class="panel__link" href="expenses/list.html">전체 보기 →</a>
      </div>
      <ul class="recent-list" id="recent-list"></ul>
    </section>
  </div>

</main>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="index.js"></script>
</body>
</html>
